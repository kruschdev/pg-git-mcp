services:
  app:
    build: .
    ports:
      - "4890:4890"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/client/node_modules
    command: sh -c "npm install && cd client && npm install && cd .. && npm run dev"
